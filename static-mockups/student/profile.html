<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>My Profile — UniFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static-mockups/assets/css/styles.css">
<style>
  .card-flip { perspective: 1200px; }
  .card-flip .inner { position: relative; transition: transform .6s; transform-style: preserve-3d; }
  .card-flip.flipped .inner { transform: rotateY(180deg); }
  .card-flip .face { backface-visibility: hidden; }
  .card-flip .face.back { position: absolute; inset: 0; transform: rotateY(180deg); }
</style>
</head><body>
<script src="/static-mockups/assets/js/mock-data.js"></script>
<script src="/static-mockups/assets/js/app.js"></script>
<script>
  UniFlow.renderShell({ title: 'My Profile' });

  const me = MOCK.students[0]; // Aysel Quliyeva — S-1001
  const initials = me.name.split(' ').map(p => p[0]).join('').slice(0,2);
  const cardId = me.id + '-' + new Date().getFullYear();
  const validUntil = new Date(); validUntil.setFullYear(validUntil.getFullYear() + 2);
  const qrData = encodeURIComponent('UNIFLOW|STUDENT|' + me.id + '|' + cardId);
  const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&margin=0&data=' + qrData;

  const docs = [
    { ic: '🪪', name: 'National ID copy', sub: 'PDF · 0.6 MB · uploaded 2024-09-02', secure: true },
    { ic: '📜', name: 'High-school diploma', sub: 'PDF · 1.2 MB · verified by Registrar', secure: true },
    { ic: '📄', name: 'Enrollment certificate (Fall 2025)', sub: 'PDF · 90 KB · auto-generated', secure: false },
    { ic: '🧾', name: 'Tuition receipt — installment 1', sub: 'PDF · 78 KB · 2025-09-15', secure: false },
    { ic: '🏆', name: 'Scholarship award letter', sub: 'PDF · 110 KB · Merit, partial', secure: true },
    { ic: '📊', name: 'Transcript (unofficial)', sub: 'PDF · 220 KB · GPA ' + me.gpa, secure: false },
    { ic: '🩺', name: 'Medical clearance', sub: 'PDF · 320 KB · expires 2027-06-01', secure: true },
    { ic: '🏠', name: 'Dorm contract', sub: 'PDF · 180 KB · Block B / Room 214', secure: true },
  ];

  UniFlow.setContent(`
    <div class="card">
      <div class="profile-head">
        <div class="avatar-lg">${initials}</div>
        <div class="flex-1">
          <h2>${me.name}</h2>
          <div class="sub">${me.dept} · Year ${me.year} · <code>${me.id}</code></div>
          <div class="row mt-12">
            <span class="badge success">Active enrollment</span>
            <span class="badge info">GPA ${me.gpa}</span>
            <span class="badge ${me.balance > 0 ? 'warn' : 'muted'}">${me.balance > 0 ? 'Balance ₼' + me.balance : 'No balance'}</span>
          </div>
        </div>
        <div class="row">
          <button class="btn ghost" onclick="alert('Edit profile (stub)')">Edit</button>
          <button class="btn primary" onclick="window.print()">Print</button>
        </div>
      </div>
    </div>

    <div class="profile-grid mt-16">
      <div>
        <div class="card">
          <h2>Personal information</h2>
          <div class="info-row"><div class="k">Full name</div><div>${me.name}</div></div>
          <div class="info-row"><div class="k">Student ID</div><div><code>${me.id}</code></div></div>
          <div class="info-row"><div class="k">Date of birth</div><div>14 March 2005</div></div>
          <div class="info-row"><div class="k">National ID</div><div>AZE-•••• 4421</div></div>
          <div class="info-row"><div class="k">Email</div><div>aysel.quliyeva@uniflow.edu</div></div>
          <div class="info-row"><div class="k">Phone</div><div>+994 50 ••• 12 38</div></div>
          <div class="info-row"><div class="k">Address</div><div>Yasamal, Baku, Azerbaijan</div></div>
          <div class="info-row"><div class="k">Emergency contact</div><div>Quliyev Rauf · +994 55 ••• 91 02</div></div>
        </div>

        <div class="card mt-16">
          <h2>Academic record</h2>
          <div class="info-row"><div class="k">Faculty</div><div>Engineering &amp; Applied Sciences</div></div>
          <div class="info-row"><div class="k">Department</div><div>${me.dept}</div></div>
          <div class="info-row"><div class="k">Programme</div><div>BSc Computer Science (4 years)</div></div>
          <div class="info-row"><div class="k">Year / Semester</div><div>Year ${me.year} · Semester 4</div></div>
          <div class="info-row"><div class="k">Cumulative GPA</div><div><strong>${me.gpa}</strong> / 4.0</div></div>
          <div class="info-row"><div class="k">Credits earned</div><div>78 / 240</div></div>
          <div class="info-row"><div class="k">Academic advisor</div><div>Dr. Samir Bayramov</div></div>
          <div class="info-row"><div class="k">Expected graduation</div><div>June 2028</div></div>
        </div>

        <div class="card mt-16">
          <h2>Documents</h2>
          <p class="text-muted text-sm" style="margin-bottom:12px">Files are accessible only to you and the Registrar. Secured items require re-authentication to download.</p>
          <div class="docs-list">
            ${docs.map(d => `<div class="doc-row">
              <div class="ic">${d.ic}</div>
              <div class="main"><strong>${d.name}</strong><div class="sub">${d.sub}</div></div>
              ${d.secure ? '<span class="badge muted">🔒 Secured</span>' : ''}
              <button class="btn ghost btn-sm" onclick="alert('Preview ${d.name.replace(/'/g, '')} (stub)')">Preview</button>
              <button class="btn btn-sm" onclick="alert('Download ${d.name.replace(/'/g, '')} (stub)')">Download</button>
            </div>`).join('')}
          </div>
          <div class="row end mt-12">
            <button class="btn ghost btn-sm" onclick="alert('Request a new document from Registrar (stub)')">Request document</button>
            <button class="btn btn-sm" onclick="alert('Upload document (stub)')">Upload</button>
          </div>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="row between">
            <h2>Digital Student Card</h2>
            <button class="btn ghost btn-sm" onclick="document.getElementById('flip').classList.toggle('flipped')">↻ Flip</button>
          </div>

          <div id="flip" class="card-flip mt-12" style="max-width:360px;margin:0 auto">
            <div class="inner" style="aspect-ratio:1.586/1">
              <div class="id-card student face">
                <div class="holo"></div>
                <div class="role-tag">Student</div>
                <div class="uni"><div class="mark">U</div> UniFlow University</div>
                <div class="body">
                  <div class="photo">${initials}</div>
                  <div>
                    <div class="name">${me.name}</div>
                    <div class="meta">
                      <div>${me.dept}</div>
                      <div>Year ${me.year} · Sem 4</div>
                    </div>
                  </div>
                </div>
                <div class="footer">
                  <div>
                    <div style="opacity:.8">ID</div>
                    <div style="font-weight:700"><code style="color:#fff">${me.id}</code></div>
                    <div style="margin-top:4px;opacity:.8">Valid until ${validUntil.toLocaleDateString('en-GB',{month:'short',year:'numeric'})}</div>
                  </div>
                  <div class="qr"><img src="${qrUrl}" alt="QR"></div>
                </div>
              </div>
              <div class="id-card back face">
                <div class="strip"></div>
                <div style="margin-top:78px">
                  <div class="small"><strong>Card #</strong> ${cardId}</div>
                  <div class="small"><strong>Issued</strong> ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</div>
                  <div class="small"><strong>Faculty</strong> Engineering &amp; Applied Sciences</div>
                  <div class="small" style="margin-top:8px">If found, please return to:<br><strong>UniFlow University, Registrar Office</strong><br>16 Azadliq Ave, Baku · +994 12 345 67 89</div>
                </div>
              </div>
            </div>
          </div>

          <div class="row mt-16">
            <button class="btn primary flex-1" onclick="alert('Added to Apple Wallet (stub)')">📲 Add to Wallet</button>
            <button class="btn flex-1" onclick="alert('PDF downloaded (stub)')">⬇️ PDF</button>
          </div>
          <p class="text-muted text-sm mt-12" style="text-align:center">QR encodes <code>${decodeURIComponent(qrData)}</code> — scanners at turnstiles match this against the active session.</p>
        </div>

        <div class="card mt-16">
          <h2>Quick actions</h2>
          <div class="row" style="flex-wrap:wrap;gap:8px">
            <a class="btn btn-sm" href="/static-mockups/student/schedule.html">📅 Schedule</a>
            <a class="btn btn-sm" href="/static-mockups/student/attendance.html">✅ Attendance</a>
            <a class="btn btn-sm" href="/static-mockups/student/payments.html">💳 Payments</a>
            <a class="btn btn-sm" href="/static-mockups/exams/paper.html">🧪 Transcripts</a>
          </div>
        </div>

        <div class="card mt-16">
          <h2>Login &amp; security</h2>
          <div class="info-row"><div class="k">Last sign-in</div><div>${new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} · web</div></div>
          <div class="info-row"><div class="k">2FA</div><div><span class="badge success">Enabled</span> Authenticator app</div></div>
          <div class="info-row"><div class="k">Devices</div><div>2 active sessions</div></div>
          <button class="btn ghost btn-sm mt-12" onclick="alert('Open security settings (stub)')">Manage</button>
        </div>
      </div>
    </div>
  `);
</script>
</body></html>
