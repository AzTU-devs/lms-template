<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithms Midterm — Online Exam — UniFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static-mockups/assets/css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head><body>
<script src="/static-mockups/assets/js/mock-data.js"></script>
<script src="/static-mockups/assets/js/app.js"></script>
<script>
  UniFlow.renderShell({ title: 'Algorithms Midterm — Online Exam' });

  const Q = MOCK.onlineExamQuestions;
  const state = {
    idx: 0,
    answers: {},
    flagged: new Set(),
    tabSwitches: 0,
    submitted: false,
    startedAt: Date.now(),
    questionStartedAt: Date.now(),
    perQuestionMs: {},
  };

  function renderExam() {
    const q = Q[state.idx];
    const flagged = state.flagged.has(q.id);
    const a = state.answers[q.id];

    let body = '';
    if (q.type === 'mcq') {
      body = `<div style="display:flex;flex-direction:column;gap:10px">
        ${q.options.map((o, i) => `
          <label class="card" style="padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;margin:0;border:${a===i?'2px solid var(--primary)':'1px solid var(--border)'}">
            <input type="radio" name="ans" value="${i}" ${a===i?'checked':''} onchange="window._setAns(${i})">
            <span>${o}</span>
          </label>
        `).join('')}
      </div>`;
    } else if (q.type === 'tf') {
      body = `<div style="display:flex;gap:10px">
        ${[['true','True'],['false','False']].map(([v,l]) => `
          <label class="card" style="padding:12px 22px;cursor:pointer;flex:1;margin:0;text-align:center;border:${String(a)===v?'2px solid var(--primary)':'1px solid var(--border)'}">
            <input type="radio" name="ans" value="${v}" ${String(a)===v?'checked':''} onchange="window._setAns('${v}')" style="margin-right:8px">
            ${l}
          </label>
        `).join('')}
      </div>`;
    } else if (q.type === 'short') {
      body = `<textarea rows="6" placeholder="Type your answer..." style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font:inherit;resize:vertical" oninput="window._setAns(this.value)">${a||''}</textarea>`;
    } else if (q.type === 'code') {
      body = `
        <div class="text-sm text-muted" style="margin-bottom:6px">Code editor (in production this would be Monaco / CodeMirror)</div>
        <textarea rows="12" placeholder="// your code here" style="width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-family:Menlo,Consolas,monospace;font-size:13px;background:#0f172a;color:#e2e8f0;resize:vertical" oninput="window._setAns(this.value)">${a||''}</textarea>
        <div class="row" style="gap:8px;margin-top:8px">
          <select style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font:inherit"><option>Python 3.11</option><option>JavaScript</option><option>C++17</option><option>Java 17</option></select>
          <button class="btn btn-sm ghost" onclick="alert('Sandbox run stub')">▶ Run sample</button>
        </div>`;
    }

    const html = `
      <div class="card" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <div>
          <div class="text-muted text-sm">Subject</div>
          <strong style="font-size:16px">Algorithms — Midterm</strong>
        </div>
        <div style="flex:1"></div>
        <div style="text-align:center">
          <div class="text-muted text-sm">Time remaining</div>
          <div id="timer" style="font-size:28px;font-weight:700;color:var(--primary);font-variant-numeric:tabular-nums">01:32:14</div>
        </div>
        <div style="text-align:center">
          <div class="text-muted text-sm">Question</div>
          <div style="font-size:18px;font-weight:600">${state.idx + 1} of ${Q.length}</div>
        </div>
      </div>

      <div class="card mt-16">
        <div class="row" style="gap:8px;flex-wrap:wrap;align-items:center">
          <span class="badge success">Fullscreen ✓</span>
          <span class="badge success">Tab focus ✓</span>
          <span class="badge warn">Webcam: pending</span>
          <span class="badge ${state.tabSwitches>0?'danger':'muted'}" id="tab-switch-badge">Tab switches: ${state.tabSwitches}</span>
          <span class="badge muted">Mic check ✓</span>
          <div style="flex:1"></div>
          <button class="btn btn-sm" onclick="document.documentElement.requestFullscreen && document.documentElement.requestFullscreen()">Enter fullscreen</button>
          <button class="btn btn-sm ghost" onclick="alert('Webcam capture stub')">Enable webcam</button>
        </div>
      </div>

      <div class="card mt-16">
        <div class="row between" style="margin-bottom:8px">
          <div class="text-muted text-sm">Q${state.idx + 1} · ${q.type.toUpperCase()}</div>
          <div>${flagged ? '<span class="badge warn">Flagged</span>' : ''}</div>
        </div>
        <h2 style="margin-top:0">${q.text}</h2>
        <div class="mt-12">${body}</div>
      </div>

      <div class="card mt-16">
        <div class="row" style="gap:8px;flex-wrap:wrap">
          <button class="btn ghost" ${state.idx===0?'disabled':''} onclick="window._prev()">← Previous</button>
          <button class="btn" onclick="window._flag()">${flagged?'Unflag':'⚑ Flag for review'}</button>
          <div style="flex:1"></div>
          <div class="text-sm text-muted" style="align-self:center">
            ${Q.map((qq,i) => `<span style="display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;margin:0 2px;background:${state.answers[qq.id]!=null?'#1A5AD7':'#e2e8f0'};color:${state.answers[qq.id]!=null?'#fff':'#64748b'};font-size:11px;font-weight:600;cursor:pointer" onclick="window._goto(${i})">${i+1}</span>`).join('')}
          </div>
          <div style="flex:1"></div>
          ${state.idx === Q.length - 1
            ? '<button class="btn primary" onclick="window._submit()">Submit exam</button>'
            : '<button class="btn primary" onclick="window._next()">Next →</button>'
          }
        </div>
      </div>
    `;
    UniFlow.setContent(html);
  }

  function recordTime() {
    const q = Q[state.idx];
    state.perQuestionMs[q.id] = (state.perQuestionMs[q.id] || 0) + (Date.now() - state.questionStartedAt);
    state.questionStartedAt = Date.now();
  }

  window._setAns = (v) => { state.answers[Q[state.idx].id] = v; };
  window._next = () => { recordTime(); state.idx = Math.min(state.idx + 1, Q.length - 1); renderExam(); };
  window._prev = () => { recordTime(); state.idx = Math.max(state.idx - 1, 0); renderExam(); };
  window._goto = (i) => { recordTime(); state.idx = i; renderExam(); };
  window._flag = () => { const id = Q[state.idx].id; state.flagged.has(id) ? state.flagged.delete(id) : state.flagged.add(id); renderExam(); };
  window._submit = () => {
    if (!confirm('Submit exam? You will not be able to make changes.')) return;
    recordTime();
    state.submitted = true;
    renderResults();
  };

  function renderResults() {
    const html = `
      <div class="card" style="background:linear-gradient(135deg, #1A5AD7 0%, #3b78ea 100%); color:#fff">
        <div style="font-size:14px;opacity:.85">Exam submitted · Algorithms Midterm</div>
        <div style="display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-top:8px">
          <div>
            <div style="font-size:64px;font-weight:700;line-height:1">78<span style="font-size:28px;opacity:.7">/100</span></div>
            <div style="opacity:.85">Provisional score · auto-graded portion</div>
          </div>
          <div style="flex:1"></div>
          <div>
            <div style="opacity:.85;font-size:14px">Percentile</div>
            <div style="font-size:32px;font-weight:600">Top 24%</div>
          </div>
          <div>
            <div style="opacity:.85;font-size:14px">Time used</div>
            <div style="font-size:32px;font-weight:600">28m 47s</div>
          </div>
        </div>
      </div>

      <div class="grid two mt-16">
        <div class="card">
          <h2>Correct vs wrong</h2>
          <div class="chart-wrap"><canvas id="cw-chart"></canvas></div>
        </div>
        <div class="card">
          <h2>Time per question</h2>
          <div class="table-wrap">
            <table class="data">
              <thead><tr><th>Question</th><th>Type</th><th>Result</th><th>Time</th></tr></thead>
              <tbody>
                ${Q.map((q,i) => {
                  const ms = state.perQuestionMs[q.id] || (Math.random()*200000 + 60000);
                  const sec = Math.round(ms/1000);
                  const results = ['Correct','Correct','Partial','Pending review'];
                  const colors = ['success','success','warn','muted'];
                  return `<tr><td>Q${i+1}</td><td>${q.type.toUpperCase()}</td><td><span class="badge ${colors[i]}">${results[i]}</span></td><td>${Math.floor(sec/60)}m ${sec%60}s</td></tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="card mt-16">
        <div class="row between">
          <div>
            <h2 style="margin:0">What's next</h2>
            <div class="text-muted text-sm">Short-answer and code responses are queued for teacher review. You will be notified when grading is final.</div>
          </div>
          <div class="row" style="gap:8px">
            <a class="btn ghost" href="/static-mockups/exams/index.html">Back to exams</a>
            <button class="btn primary" onclick="alert('Receipt PDF stub')">Download receipt</button>
          </div>
        </div>
      </div>
    `;
    UniFlow.setContent(html);

    new Chart(document.getElementById('cw-chart'), {
      type: 'bar',
      data: {
        labels: ['Correct','Partial','Wrong','Pending'],
        datasets: [{
          data: [2, 1, 0, 1],
          backgroundColor: ['rgba(34,197,94,.75)','rgba(245,158,11,.75)','rgba(239,68,68,.75)','rgba(148,163,184,.55)'],
          borderRadius: 6,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
      },
    });
  }

  // Initial render
  renderExam();

  // Countdown timer (real)
  let remaining = 1*3600 + 32*60 + 14;
  setInterval(() => {
    if (state.submitted) return;
    remaining = Math.max(0, remaining - 1);
    const h = String(Math.floor(remaining/3600)).padStart(2,'0');
    const m = String(Math.floor((remaining%3600)/60)).padStart(2,'0');
    const s = String(remaining%60).padStart(2,'0');
    const el = document.getElementById('timer');
    if (el) el.textContent = `${h}:${m}:${s}`;
  }, 1000);

  // Tab switch detection
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && !state.submitted) {
      state.tabSwitches++;
      const el = document.getElementById('tab-switch-badge');
      if (el) {
        el.textContent = `Tab switches: ${state.tabSwitches}`;
        el.className = 'badge danger';
      }
    }
  });
</script>
</body></html>
