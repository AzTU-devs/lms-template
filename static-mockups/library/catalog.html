<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Library Catalogue — UniFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static-mockups/assets/css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  .lib-hero { padding: 22px; background: linear-gradient(135deg, var(--primary) 0%, #2a6fe8 100%); color: #fff; border-radius: 16px; box-shadow: var(--shadow-md); }
  .lib-hero h2 { margin: 0 0 4px; font-size: 22px; font-weight: 700; }
  .lib-hero p { margin: 0 0 16px; opacity: .85; font-size: 13px; }
  .search-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; }
  .search-row input, .search-row select { padding: 11px 14px; border-radius: 10px; border: none; font: inherit; font-size: 14px; background: rgba(255,255,255,.95); color: #0b1220; }
  .search-row input::placeholder { color: #6b7385; }
  .avail-toggle { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; cursor: pointer; }
  .avail-toggle input { width: 16px; height: 16px; }
  .pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .pills button { background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 999px; font: inherit; font-size: 13px; cursor: pointer; font-weight: 500; }
  .pills button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .book-card { display: flex; flex-direction: column; gap: 6px; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface); transition: transform .15s, box-shadow .15s; }
  .book-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .book-card .cover { font-size: 44px; line-height: 1; text-align: center; padding: 12px 0; background: var(--primary-soft); border-radius: 10px; margin-bottom: 4px; }
  .book-card .title { font-weight: 600; font-size: 14px; line-height: 1.3; min-height: 36px; }
  .book-card .meta { font-size: 12px; color: var(--muted); }
  .book-card .badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .book-card .actions { margin-top: auto; display: flex; gap: 6px; flex-wrap: wrap; }
  .book-card .actions .btn { flex: 1 1 auto; min-width: 0; padding: 6px 8px; font-size: 12px; }
  .feat-carousel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .feat-card { display: flex; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 12px; background: linear-gradient(135deg, var(--primary-soft) 0%, var(--surface) 100%); }
  .feat-card .cover { font-size: 38px; line-height: 1; }
  .feat-card .info { flex: 1; min-width: 0; }
  .feat-card .t { font-weight: 600; font-size: 13px; line-height: 1.25; }
  .feat-card .a { color: var(--muted); font-size: 11px; margin-top: 2px; }
  .feat-card .r { font-size: 12px; margin-top: 4px; font-weight: 600; color: var(--warn); }
  .rec-panel { padding: 16px; border-radius: 12px; background: linear-gradient(135deg, #faf5ff 0%, #fff 100%); border: 1px solid #e9d5ff; }
  .rec-panel h3 { margin: 0 0 4px; font-size: 14px; font-weight: 700; }
  .rec-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--border); }
  .rec-item:last-child { border-bottom: none; }
  .rec-item .cover { font-size: 26px; }
  .rec-item .why { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.3; font-style: italic; }
  .rec-item .t { font-weight: 600; font-size: 13px; line-height: 1.25; }
  .modal-wrap { position: fixed; inset: 0; background: rgba(11,18,32,.55); display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal-wrap.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; padding: 24px; max-width: 560px; width: 100%; box-shadow: var(--shadow-md); max-height: 90vh; overflow-y: auto; }
  .modal .head { display: flex; gap: 14px; align-items: flex-start; }
  .modal .cover-big { font-size: 64px; line-height: 1; padding: 12px 18px; background: var(--primary-soft); border-radius: 12px; }
  .modal .x { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); }
  .det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; margin: 14px 0; font-size: 13px; }
  .det-grid .k { color: var(--muted); }
  @media (max-width: 900px) { .search-row { grid-template-columns: 1fr 1fr; } .feat-carousel { grid-template-columns: repeat(2, 1fr); } }
</style>
</head><body>
<script src="/static-mockups/assets/js/mock-data.js"></script>
<script src="/static-mockups/assets/js/app.js"></script>
<script>
  UniFlow.renderShell({ title: 'Library Catalogue' });

  const BOOKS = MOCK.libraryBooks;
  const SUBJECTS = MOCK.librarySubjects;

  let q = '';
  let subjectFilter = 'All';
  let langFilter = 'All';
  let formatFilter = 'Any';
  let availOnly = false;
  let subjectPill = 'All';

  function fmtAvail(b) {
    if (b.available === 0) return '<span class="badge muted">Checked out</span>';
    if (b.available === b.copies) return '<span class="badge success">Available</span>';
    return '<span class="badge info">' + b.available + ' of ' + b.copies + '</span>';
  }

  function bookCard(b) {
    const fmtBadge = b.eBook
      ? '<span class="badge info">eBook</span>'
      : '<span class="badge muted">Print</span>';
    const canBorrow = b.available > 0;
    const acts = [
      '<button class="btn btn-sm ghost" data-act="details" data-id="' + b.id + '">Details</button>',
      canBorrow
        ? '<button class="btn btn-sm primary" data-act="borrow" data-id="' + b.id + '">Borrow</button>'
        : '<button class="btn btn-sm" data-act="reserve" data-id="' + b.id + '">Reserve</button>',
    ];
    if (b.eBook) acts.push('<button class="btn btn-sm ghost" data-act="read" data-id="' + b.id + '">Read</button>');
    return (
      '<div class="book-card">' +
        '<div class="cover">' + b.cover + '</div>' +
        '<div class="title">' + b.title + '</div>' +
        '<div class="meta">' + b.authors.split(',')[0] + ' · ' + b.year + '</div>' +
        '<div class="badges">' +
          '<span class="badge">' + b.subject + '</span>' +
          fmtBadge +
          fmtAvail(b) +
        '</div>' +
        '<div class="meta">⭐ ' + b.rating.toFixed(1) + ' · ' + b.lang + '</div>' +
        '<div class="actions">' + acts.join('') + '</div>' +
      '</div>'
    );
  }

  function filterBooks() {
    return BOOKS.filter(b => {
      if (q) {
        const hay = (b.title + ' ' + b.authors + ' ' + b.isbn + ' ' + b.subject).toLowerCase();
        if (!hay.includes(q.toLowerCase())) return false;
      }
      const sub = subjectPill !== 'All' ? subjectPill : subjectFilter;
      if (sub !== 'All' && b.subject !== sub) return false;
      if (langFilter !== 'All' && b.lang !== langFilter) return false;
      if (formatFilter === 'eBook only' && !b.eBook) return false;
      if (formatFilter === 'Print only' && b.eBook) return false;
      if (availOnly && b.available === 0) return false;
      return true;
    });
  }

  const topRated = [...BOOKS].sort((a,b) => b.rating - a.rating).slice(0, 4);
  const recBooks = BOOKS.filter(b => b.subject === 'Computer Science').slice(0, 3);
  const recWhy = {
    'B-001': 'Foundational text for your CS degree — referenced by Algorithms course.',
    'B-002': 'Software engineering essentials — paired with your current homework on code quality.',
    'B-004': 'Popular among CS seniors at AzTU — practical career-shaping read.',
    'B-005': 'Required reading for next semester\'s OS course.',
    'B-014': 'Hot pick — students enrolled in AI Tutor sessions read this most.',
    'B-019': 'Companion text for Networking module starting next month.',
  };

  function render() {
    const list = filterBooks();
    const totalBooks = BOOKS.reduce((s,b) => s + b.copies, 0);
    const availNow = BOOKS.reduce((s,b) => s + b.available, 0);
    const eBooks = BOOKS.filter(b => b.eBook).length;
    const recent = 6;

    const featHtml = topRated.map(b =>
      '<div class="feat-card">' +
        '<div class="cover">' + b.cover + '</div>' +
        '<div class="info">' +
          '<div class="t">' + b.title + '</div>' +
          '<div class="a">' + b.authors.split(',')[0] + '</div>' +
          '<div class="r">⭐ ' + b.rating.toFixed(1) + '</div>' +
        '</div>' +
      '</div>'
    ).join('');

    const pillsHtml = ['All', ...SUBJECTS].map(s =>
      '<button data-pill="' + s + '" class="' + (subjectPill === s ? 'active' : '') + '">' + s + '</button>'
    ).join('');

    const gridHtml = list.length
      ? list.map(bookCard).join('')
      : '<div class="empty" style="grid-column: 1/-1;"><div class="emoji">📚</div><div>No books match your filters.</div></div>';

    const recHtml = recBooks.map(b =>
      '<div class="rec-item">' +
        '<div class="cover">' + b.cover + '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div class="t">' + b.title + '</div>' +
          '<div class="why">Why this? ' + (recWhy[b.id] || 'Matches your Computer Science programme.') + '</div>' +
          '<div class="row" style="margin-top:6px;gap:6px">' +
            '<button class="btn btn-sm ghost" data-act="details" data-id="' + b.id + '">Details</button>' +
            (b.eBook ? '<button class="btn btn-sm primary" data-act="read" data-id="' + b.id + '">Read</button>' : '') +
          '</div>' +
        '</div>' +
      '</div>'
    ).join('');

    UniFlow.setContent(
      '<div class="lib-hero">' +
        '<h2>📚 Find your next read</h2>' +
        '<p>Search 20,000+ titles across the AzTU library system.</p>' +
        '<div class="search-row">' +
          '<input id="q" type="text" placeholder="Title, author, ISBN, subject…" value="' + q.replace(/"/g,'&quot;') + '">' +
          '<select id="subj"><option>All</option>' + SUBJECTS.map(s => '<option' + (subjectFilter===s?' selected':'') + '>' + s + '</option>').join('') + '</select>' +
          '<select id="lang">' + ['All','EN','AZ'].map(l => '<option' + (langFilter===l?' selected':'') + '>' + l + '</option>').join('') + '</select>' +
          '<select id="fmt">' + ['Any','eBook only','Print only'].map(f => '<option' + (formatFilter===f?' selected':'') + '>' + f + '</option>').join('') + '</select>' +
        '</div>' +
        '<label class="avail-toggle"><input type="checkbox" id="avail"' + (availOnly?' checked':'') + '> Available now only</label>' +
      '</div>' +

      '<div class="grid kpi mt-16">' +
        '<div class="card kpi-card"><div class="label">Total copies</div><div class="value">' + totalBooks + '</div><div class="delta">across ' + BOOKS.length + ' titles</div></div>' +
        '<div class="card kpi-card"><div class="label">Available now</div><div class="value">' + availNow + '</div><div class="delta">ready to borrow</div></div>' +
        '<div class="card kpi-card"><div class="label">eBooks</div><div class="value">' + eBooks + '</div><div class="delta">read online</div></div>' +
        '<div class="card kpi-card"><div class="label">Added this month</div><div class="value">' + recent + '</div><div class="delta">new arrivals</div></div>' +
      '</div>' +

      '<div class="card mt-16">' +
        '<h3 style="margin:0 0 12px;font-size:15px">⭐ Featured & top-rated</h3>' +
        '<div class="feat-carousel">' + featHtml + '</div>' +
      '</div>' +

      '<div class="grid two mt-16" style="grid-template-columns: 2.4fr 1fr; gap: 16px">' +
        '<div>' +
          '<div class="card">' +
            '<div class="row between" style="margin-bottom:12px">' +
              '<h3 style="margin:0;font-size:15px">Browse by subject</h3>' +
              '<span class="text-muted text-sm">' + list.length + ' results</span>' +
            '</div>' +
            '<div class="pills" id="pills">' + pillsHtml + '</div>' +
          '</div>' +
          '<div class="card mt-16">' +
            '<div class="book-grid">' + gridHtml + '</div>' +
          '</div>' +
        '</div>' +
        '<div>' +
          '<div class="rec-panel">' +
            '<h3>🤖 Recommended for you</h3>' +
            '<div class="text-muted text-sm" style="margin-bottom:6px">Based on your department · Computer Science</div>' +
            recHtml +
          '</div>' +
          '<div class="card mt-16">' +
            '<h3 style="margin:0 0 8px;font-size:14px">📖 Your loans</h3>' +
            '<div class="text-muted text-sm">2 active · 1 overdue</div>' +
            '<a href="/static-mockups/student/profile.html" class="btn btn-sm ghost" style="margin-top:8px;display:inline-block">View profile</a>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="modal-wrap" id="modal"><div class="modal" id="modal-body"></div></div>'
    );

    // wire
    document.getElementById('q').addEventListener('input', e => { q = e.target.value; render(); document.getElementById('q').focus(); });
    document.getElementById('subj').addEventListener('change', e => { subjectFilter = e.target.value; subjectPill = 'All'; render(); });
    document.getElementById('lang').addEventListener('change', e => { langFilter = e.target.value; render(); });
    document.getElementById('fmt').addEventListener('change', e => { formatFilter = e.target.value; render(); });
    document.getElementById('avail').addEventListener('change', e => { availOnly = e.target.checked; render(); });
    document.querySelectorAll('#pills button').forEach(b => b.addEventListener('click', () => {
      subjectPill = b.dataset.pill; render();
    }));
    document.querySelectorAll('[data-act]').forEach(el => el.addEventListener('click', () => {
      const id = el.dataset.id;
      const book = BOOKS.find(x => x.id === id);
      if (el.dataset.act === 'details') openModal(book);
      else if (el.dataset.act === 'borrow') alert('Borrow request placed for "' + book.title + '" — pickup at the front desk within 48 hours.');
      else if (el.dataset.act === 'reserve') {
        const holds = MOCK.libraryHolds.filter(h => h.book === id).length;
        alert('Hold placed on "' + book.title + '" — you are position #' + (holds + 1) + ' in the queue.');
      }
      else if (el.dataset.act === 'read') window.location.href = '/static-mockups/library/reader.html?b=' + id;
    }));
    document.getElementById('modal').addEventListener('click', e => {
      if (e.target.id === 'modal') closeModal();
    });
  }

  function openModal(b) {
    const eBookBtn = b.eBook ? '<button class="btn ghost" data-mact="read">Read online</button>' : '';
    const primaryBtn = b.available > 0
      ? '<button class="btn primary" data-mact="borrow">Borrow</button>'
      : '<button class="btn" data-mact="reserve">Reserve</button>';
    const body = (
      '<div class="row between" style="align-items:flex-start">' +
        '<div class="head" style="flex:1">' +
          '<div class="cover-big">' + b.cover + '</div>' +
          '<div>' +
            '<h2 style="margin:0 0 4px;font-size:18px">' + b.title + '</h2>' +
            '<div class="text-muted text-sm">' + b.authors + '</div>' +
            '<div class="badges mt-12">' +
              '<span class="badge">' + b.subject + '</span>' +
              (b.eBook ? '<span class="badge info">eBook</span>' : '<span class="badge muted">Print</span>') +
              fmtAvail(b) +
              '<span class="badge warn">⭐ ' + b.rating.toFixed(1) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<button class="x" data-mact="close">×</button>' +
      '</div>' +
      '<p class="mt-16" style="font-size:13px;line-height:1.55">' + b.summary + '</p>' +
      '<div class="det-grid">' +
        '<div class="k">ISBN</div><div>' + b.isbn + '</div>' +
        '<div class="k">Publisher</div><div>' + b.publisher + '</div>' +
        '<div class="k">Year</div><div>' + b.year + '</div>' +
        '<div class="k">Pages</div><div>' + b.pages + '</div>' +
        '<div class="k">Language</div><div>' + b.lang + '</div>' +
        '<div class="k">Shelf</div><div>' + b.shelf + '</div>' +
        '<div class="k">Copies</div><div>' + b.copies + ' total · ' + b.available + ' available</div>' +
      '</div>' +
      '<div class="row end" style="gap:8px;margin-top:8px">' +
        eBookBtn + primaryBtn +
      '</div>'
    );
    document.getElementById('modal-body').innerHTML = body;
    document.getElementById('modal').classList.add('open');
    document.querySelectorAll('[data-mact]').forEach(el => el.addEventListener('click', () => {
      const act = el.dataset.mact;
      if (act === 'close') closeModal();
      else if (act === 'borrow') { alert('Borrow request placed for "' + b.title + '" — pickup at the front desk within 48 hours.'); closeModal(); }
      else if (act === 'reserve') {
        const holds = MOCK.libraryHolds.filter(h => h.book === b.id).length;
        alert('Hold placed on "' + b.title + '" — you are position #' + (holds + 1) + ' in the queue.');
        closeModal();
      }
      else if (act === 'read') window.location.href = '/static-mockups/library/reader.html?b=' + b.id;
    }));
  }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  render();
</script>
</body></html>
