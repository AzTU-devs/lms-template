<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events — UniFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static-mockups/assets/css/styles.css">
<style>
  .event-card { display:grid; grid-template-columns:80px 1fr auto; gap:16px; padding:16px; border:1px solid #EEF1F6; border-radius:10px; margin-bottom:12px; align-items:center; background:#fff; }
  .date-block { text-align:center; background:#EEF3FD; color:#1A5AD7; border-radius:8px; padding:10px 0; }
  .date-block .day { font-size:28px; font-weight:700; line-height:1; }
  .date-block .mon { font-size:12px; text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }
  .cap-bar { height:6px; background:#EEF1F6; border-radius:3px; overflow:hidden; margin-top:6px; }
  .cap-fill { height:100%; background:#1A5AD7; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cal-grid .cell { aspect-ratio:1; border:1px solid #EEF1F6; border-radius:6px; padding:6px; font-size:12px; position:relative; background:#fff; }
  .cal-grid .cell.has-event { border-color:#1A5AD7; }
  .cal-grid .cell .dot { width:6px; height:6px; background:#1A5AD7; border-radius:50%; position:absolute; bottom:6px; right:6px; }
  .cal-grid .head { background:#F5F7FA; text-align:center; font-weight:600; aspect-ratio:auto; padding:8px 0; }
</style>
</head><body>
<script src="/static-mockups/assets/js/mock-data.js"></script>
<script src="/static-mockups/assets/js/app.js"></script>
<script>
UniFlow.renderShell({ title: 'Events' });

const events = (MOCK.events || []).slice();
const rsvped = new Set();

function kpis() {
  const totalRsvp = events.reduce((s,e)=>s+(e.rsvp||0),0);
  const totalCap = events.reduce((s,e)=>s+(e.capacity||0),0);
  return `
    <div class="grid kpi">
      <div class="card"><div class="muted">Upcoming events</div><div style="font-size:28px;font-weight:700;">${events.length}</div></div>
      <div class="card"><div class="muted">Your RSVPs</div><div style="font-size:28px;font-weight:700;" id="myRsvpCount">0</div></div>
      <div class="card"><div class="muted">Capacity available</div><div style="font-size:28px;font-weight:700;">${totalCap - totalRsvp}</div></div>
    </div>`;
}

function eventCard(e) {
  const d = new Date(e.date);
  const day = d.getDate();
  const mon = d.toLocaleString('en',{month:'short'});
  const pct = Math.min(100, Math.round((e.rsvp/e.capacity)*100));
  const isMine = rsvped.has(e.id);
  return `
    <div class="event-card">
      <div class="date-block"><div class="day">${day}</div><div class="mon">${mon}</div></div>
      <div>
        <div style="font-weight:600;font-size:16px;">${e.title}</div>
        <div class="muted" style="font-size:13px;">${e.location} &middot; ${UniFlow.fmt.dateTime ? UniFlow.fmt.dateTime(e.date) : UniFlow.fmt.date(e.date)}</div>
        <div style="font-size:12px;color:#6B7280;margin-top:6px;">${e.rsvp}/${e.capacity} attending (${pct}%)</div>
        <div class="cap-bar"><div class="cap-fill" style="width:${pct}%"></div></div>
      </div>
      <button class="btn ${isMine?'ghost':'primary'}" onclick="toggleRsvp(${e.id})">${isMine?'RSVPed &check;':'RSVP'}</button>
    </div>`;
}

function listView() {
  return events.map(eventCard).join('');
}

function calendarView() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const eventDays = new Set(events.map(e => { const d=new Date(e.date); return d.getMonth()===m?d.getDate():null;}).filter(Boolean));
  const heads = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cell head">${d}</div>`).join('');
  let cells = '';
  for (let i=0;i<first;i++) cells += `<div class="cell" style="background:#FAFBFC;"></div>`;
  for (let d=1; d<=days; d++) {
    const has = eventDays.has(d);
    cells += `<div class="cell ${has?'has-event':''}">${d}${has?'<span class="dot"></span>':''}</div>`;
  }
  return `<div style="margin-bottom:12px;font-weight:600;">${now.toLocaleString('en',{month:'long',year:'numeric'})}</div><div class="cal-grid">${heads}${cells}</div>`;
}

function adminPanel() {
  if (UniFlow.ROLE !== 'Admin') return '';
  return `
    <div class="card mt-24">
      <h3 style="margin-top:0;">Create Event (Admin)</h3>
      <div class="grid two">
        <div class="field"><label>Title</label><input type="text" placeholder="Event name" style="width:100%;padding:8px 10px;border:1px solid #E2E6EE;border-radius:6px;"></div>
        <div class="field"><label>Date</label><input type="datetime-local" style="width:100%;padding:8px 10px;border:1px solid #E2E6EE;border-radius:6px;"></div>
        <div class="field"><label>Location</label><input type="text" placeholder="Auditorium A" style="width:100%;padding:8px 10px;border:1px solid #E2E6EE;border-radius:6px;"></div>
        <div class="field"><label>Capacity</label><input type="number" value="100" style="width:100%;padding:8px 10px;border:1px solid #E2E6EE;border-radius:6px;"></div>
      </div>
      <button class="btn primary mt-12" onclick="alert('Event created (stub)')">Create</button>
    </div>`;
}

UniFlow.setContent(`
  ${kpis()}
  <div class="card mt-16">
    <div class="row between">
      <div class="tabs"><button class="active" data-view="list">List</button><button data-view="cal">Calendar</button></div>
    </div>
    <div id="viewArea" class="mt-16">${listView()}</div>
  </div>
  ${adminPanel()}
`);

document.querySelectorAll('.tabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('viewArea').innerHTML = b.dataset.view==='list' ? listView() : calendarView();
  });
});

window.toggleRsvp = function(id) {
  const ev = events.find(e=>e.id===id);
  if (!ev) return;
  if (rsvped.has(id)) { rsvped.delete(id); ev.rsvp = Math.max(0, ev.rsvp-1); }
  else { rsvped.add(id); ev.rsvp = Math.min(ev.capacity, ev.rsvp+1); }
  document.getElementById('viewArea').innerHTML = listView();
  document.getElementById('myRsvpCount').textContent = rsvped.size;
};
</script>
</body></html>
